  <title>مُوجز 24 | تفاصيل الخبر</title>
  <meta name="description" content="صفحة تفاصيل الخبر - مُوجز 24">
  <script>
    (function () {
      try {
        var theme = localStorage.getItem('mojaz24-theme') || 'light';
        var fontScale = parseFloat(localStorage.getItem('mojaz24-font') || '1');
        var root = document.documentElement;
        root.setAttribute('data-theme', theme);
        root.style.colorScheme = theme === 'dark' ? 'dark' : 'light';
        if (!Number.isNaN(fontScale)) {
          root.style.fontSize = (Math.max(0.85, Math.min(1.3, fontScale)) * 16) + 'px';
        }
      } catch (e) {}
    })();
  </script>
  <style>
    html[data-theme="dark"],
    html[data-theme="dark"] body {
      background-color: #0d1117;
      color: #e6edf3;
    }

    html[data-theme="light"],
    html[data-theme="light"] body {
      background-color: #f5f6fa;
      color: #1a1d2e;
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <main class="site-main blog-main">

            <h2 class="section-title" id="articleSectionTitle">تفاصيل الخبر</h2>

          <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">

  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
  <script src="news-store.js"></script>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id') || '';
      const article = id ? MojazNewsStore.getById(id) : null;

      const articleBadge = document.getElementById('articleBadge');
      const articleSectionTitle = document.getElementById('articleSectionTitle');
      const articleMetaMini = document.getElementById('articleMetaMini');
      const articleContainer = document.getElementById('articleContainer');

      function escapeHtml(str) {
        const d = document.createElement('div');
        d.textContent = str || '';
        return d.innerHTML;
      }

      function formatDate(ts) {
        return new Date(ts).toLocaleString('ar-EG', {
          day: 'numeric',
          month: 'long',
          year: 'numeric',
          hour: 'numeric',
          minute: '2-digit'
        });
      }

      if (!article) {
        document.title = 'مُوجز 24 | الخبر غير موجود';
        articleContainer.innerHTML = `
          <div class="article-empty">
            <p>الخبر المطلوب غير موجود أو تم حذفه.</p>
            <div class="article-actions" style="justify-content:center;border-top:none;padding-top:0;margin-top:18px;">
              <a href="category.html" class="article-back-link">العودة إلى الأخبار</a>
            </div>
          </div>`;
        return;
      }

      articleBadge.textContent = article.category || 'خبر';
      articleSectionTitle.textContent = article.title || 'تفاصيل الخبر';
      articleMetaMini.textContent = formatDate(article.createdAt);
      document.title = `مُوجز 24 | ${article.title}`;

      const imageHtml = article.image
        ? `<img class="article-hero-image" src="${escapeHtml(article.image)}" alt="${escapeHtml(article.title)}">`
        : `<div class="article-hero-placeholder"><svg xmlns="http://www.w3.org/2000/svg" width="72" height="72" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect width="18" height="18" x="3" y="3" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg></div>`;

      const paragraphs = (article.content || '')
        .split(/\n+/)
        .map(part => part.trim())
        .filter(Boolean)
        .map(part => `<p>${escapeHtml(part)}</p>`)
        .join('');

      articleContainer.innerHTML = `
        <article class="article-shell">
          <div class="article-hero">
            ${imageHtml}
            <div class="article-hero-overlay">
              <div class="article-hero-content">
                <div class="article-meta-row">
                  <span class="article-meta-chip">${escapeHtml(article.category)}</span>
                  <span>${formatDate(article.createdAt)}</span>
                  ${article.updatedAt && article.updatedAt !== article.createdAt ? '<span>تم التحديث</span>' : ''}
                </div>
                <h1 class="article-title">${escapeHtml(article.title)}</h1>
                <p class="article-subtitle">${escapeHtml((article.content || '').slice(0, 180))}${(article.content || '').length > 180 ? '...' : ''}</p>
              </div>
            </div>
          </div>
          <div class="article-body">
            <div class="article-body-inner">
              <p class="article-body-lead">${escapeHtml((article.content || '').slice(0, 140))}${(article.content || '').length > 140 ? '...' : ''}</p>
              <div class="article-content">
                ${paragraphs || '<p>لا يوجد محتوى متاح لهذا الخبر حاليًا.</p>'}
              </div>
              <div class="article-actions">
                <a href="category.html?cat=${encodeURIComponent(article.category || '')}" class="article-back-link">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
                  العودة إلى ${escapeHtml(article.category || 'الأخبار')}
                </a>
                ${article.video ? `<a href="${escapeHtml(article.video)}" target="_blank" class="article-video-link"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="6 3 20 12 6 21 6 3"/></svg> مشاهدة الفيديو</a>` : ''}
              </div>
            </div>
          </div>
        </article>`;
    })();
  </script>
